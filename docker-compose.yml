version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gate
      POSTGRES_PASSWORD: gate_pass
      POSTGRES_DB: gate_prep
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gate -d gate_prep"]
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://gate:gate_pass@db:5432/gate_prep
      SECRET_KEY: dev-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      UPLOAD_DIR: /app/uploads
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
volumes:
  pgdata:
  uploads:
